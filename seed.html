<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IEL Library — Seed Firestore</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; background: #f0f4ff; }
  h1 { color: #002060; }
  button { background: #002060; color: white; border: none; padding: 14px 32px; font-size: 1rem; border-radius: 8px; cursor: pointer; margin-top: 16px; }
  button:hover { background: #0a3080; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  #log { background: white; border: 1px solid #ccc; border-radius: 8px; padding: 16px; margin-top: 20px; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; min-height: 120px; }
  .ok  { color: #00a060; }
  .err { color: #c0006f; }
</style>
</head>
<body>
<h1>📚 IEL Library — Firestore Seeder</h1>
<p>Click the button below to populate your Firestore database with all 11 books.</p>
<button id="btn" onclick="seed()">Seed Database</button>
<div id="log">Ready. Press the button to start.</div>

<script>
const PROJECT = "iel-library-lounge";
const API_KEY = "AIzaSyC4P8pH8S7XNsaIGZcv8Zx_lUbHAAis4uo";
const BASE = `https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents`;

const BOOKS = [
  {id:1,  title:"Start with Why",                          subtitle:"How Great Leaders Inspire Everyone to Take Action",   author:"Simon Sinek"},
  {id:2,  title:"Good to Great",                           subtitle:"Why Some Companies Make the Leap...and Others Don't", author:"James C. Collins"},
  {id:3,  title:"Built to Last",                           subtitle:"Successful Habits of Visionary Companies",            author:"James C. Collins & Jerry I. Porras"},
  {id:4,  title:"Blue Ocean Strategy",                     subtitle:"",                                                    author:"Renée Mauborgne & W. Chan Kim"},
  {id:5,  title:"Great by Choice",                         subtitle:"",                                                    author:"James C. Collins"},
  {id:6,  title:"Hidden Potential",                        subtitle:"The Science of Achieving Greater Things",             author:"Adam Grant"},
  {id:7,  title:"The 7 Habits of Highly Effective People", subtitle:"",                                                    author:"Stephen Covey"},
  {id:8,  title:"Atomic Habits",                           subtitle:"Build Good Habits & Break Bad Ones",                  author:"James Clear"},
  {id:9,  title:"Ikigai",                                  subtitle:"The Japanese Secret to a Long and Happy Life",        author:"Francesc Miralles & Hector Garcia"},
  {id:11, title:"High Performance Habits",                 subtitle:"How Extraordinary People Become That Way",            author:"Brendon Burchard"},
  {id:12, title:"Turn the Ship Around!",                   subtitle:"A True Story of Turning Followers into Leaders",      author:"L. David Marquet"}
];

const log = document.getElementById('log');
function write(msg, cls='') { log.innerHTML += `<span class="${cls}">${msg}\n</span>`; }

function toDoc(b) {
  return {
    fields: {
      id:            { integerValue: b.id },
      title:         { stringValue: b.title },
      subtitle:      { stringValue: b.subtitle },
      author:        { stringValue: b.author },
      checkedOutBy:  { nullValue: null },
      checkedOutDate:{ nullValue: null },
      requests:      { arrayValue: { values: [] } }
    }
  };
}

async function seed() {
  document.getElementById('btn').disabled = true;
  log.textContent = '';
  write('Connecting via REST API…');

  let ok = 0;
  for (const b of BOOKS) {
    try {
      const res = await fetch(`${BASE}/books/${b.id}?key=${API_KEY}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(toDoc(b))
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error?.message || res.statusText);
      }
      ok++;
      write(`  ✓ [${ok}/${BOOKS.length}] ${b.title}`, 'ok');
    } catch(e) {
      write(`  ✗ ${b.title}: ${e.message}`, 'err');
    }
  }

  if (ok === BOOKS.length) {
    write(`\n✓ All ${BOOKS.length} books written! Close this page and open index.html.`, 'ok');
  } else {
    write(`\n${ok}/${BOOKS.length} books written. Check errors above.`, 'err');
    document.getElementById('btn').disabled = false;
  }
}
</script>
</body>
</html>
